<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  {% feed_meta %}
  <link rel="icon" type="image/png" href="{{ '/assets/images/profile.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-identity" href="{{ '/' | relative_url }}">
        <img class="avatar" src="{{ '/assets/images/profile.png' | relative_url }}" alt="Adam Wright">
        <span class="site-title-group">
          <span class="site-title">Adam Wright</span>
          <span class="site-tagline">{{ site.tagline }}</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Posts</a>
        <a href="https://github.com/theadamwright">GitHub</a>
        <a href="https://www.linkedin.com/in/theadamwright">LinkedIn</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        &copy; {{ 'now' | date: "%Y" }} Adam Wright &middot; Product Manager for
        <a href="https://www.enterprisedb.com/products/edb-postgres-distributed">EDB Postgres Distributed</a>
        &middot; <a href="https://postgresql.life/post/adam_wright/">PostgreSQL Person of the Week</a>
      </p>
    </div>
  </footer>
</body>
</html>
